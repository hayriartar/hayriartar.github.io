<div class="post-meta">

  <div class="post-categories">
    <a href="/blog/" class="post-category-link">blog</a>
  </div>

  <div class="post-categories">
    <a href="/journal/" class="post-category-link">journal</a>
  </div>

  {% assign tags = site.tags | sort %}
  {% for tag in tags %}
    <div class="post-tags">
      <a href="/tag/{{ tag[0] | slugify }}/" class="post-tag">
        #{{ tag[0] }}
      </a>
    </div>
  {% endfor %}

</div>
